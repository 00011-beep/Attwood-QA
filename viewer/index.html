*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

.layout { display: flex; flex: 1; overflow: hidden; }

                  box-shadow: 0 2px 12px rgba(0,0,0,0.15); background: #fff; }

           padding: 16px; overflow-y: auto; flex-shrink: 0;
           display: flex; flex-direction: column; gap: 20px; }

                       letter-spacing: 0.06em; color: #999; margin-bottom: 10px; }

.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
          border: 1px solid rgba(0,0,0,0.12); }
.legend-label { font-size: 0.78rem; line-height: 1.3; flex: 1; }
.legend-count { font-size: 0.75rem; color: #999; font-weight: 600;
                min-width: 22px; text-align: right; }
.no-data-row { padding-top: 8px; border-top: 1px solid #eee; margin-top: 4px; }

[...STAGES, {stage: null, name: 'No data', color: NO_COLOR}].forEach(s => {

    const div = document.createElement('div');
    div.className = 'legend-item' + (isNoData ? ' no-data-row' : '');

    legendEl.appendChild(div);

// ── Load SVGs from external files ──────────────────────
async function loadSVGs() {
    await Promise.all(SVG_FILES.map(async (file, i) => {
        const res    = await fetch(file);
        const svgStr = await res.text();
        const panel  = document.getElementById('panel-' + i);
        panel.innerHTML = svgStr;
        const svgEl = panel.querySelector('svg');
        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');
        attachHandlers(svgEl);
    }));
    applyColors();
}
loadSVGs();

// ── Zone discovery ─────────────────────────────────────
function getZones(svgEl) {
    const found = [];
    const seen  = new Set();
    // serif:id (Affinity zones — may be on <g>, <rect>, <path> or any element)
    svgEl.querySelectorAll('*').forEach(el => {
        const sid = el.getAttribute('serif:id');
        if (sid && ZONE_PAT.test(sid) && !seen.has(sid)) {
            found.push({el, id: sid});
            seen.add(sid);
        }
    });
    // Plain id (original SVG zones, e.g. RF parapets)
    svgEl.querySelectorAll('[id]').forEach(el => {
        const id = el.getAttribute('id');
        if (id && ZONE_PAT.test(id) && !seen.has(id)) {
            found.push({el, id});
            seen.add(id);
        }
    });
    return found;
}

function colorEl(el, color) {
    const shapes = el.querySelectorAll('rect, path, polygon');
    if (shapes.length > 0) {
        shapes.forEach(shape => {
            shape.style.fill        = color;
            shape.style.fillOpacity = FILL_ALPHA;
        });
    } else {
        // el itself is the shape (e.g. plain-id <path> elements)
        el.style.fill        = color;
        el.style.fillOpacity = FILL_ALPHA;
    }
}

function attachHandlers(svgEl) {
    getZones(svgEl).forEach(({el, id}) => {
        el.style.cursor = 'pointer';
        el.addEventListener('mouseenter', e => showTip(e, id));
        el.addEventListener('mousemove',  e => moveTip(e));
        el.addEventListener('mouseleave', hideTip);
        el.addEventListener('click', () => {
            const url = ZONE_URLS[id];
            if (url) window.open(url, 'dalux');
        });
    });
}

// ── Apply colours ──────────────────────────────────────
function applyColors() {
    for (let i = 0; i < 4; i++) {
        const svgEl = document.querySelector('#panel-' + i + ' svg');
        if (!svgEl) continue;
        getZones(svgEl).forEach(({el, id}) => {
            const sv    = zoneData[id];
            const info  = sv !== undefined
                ? STAGES.find(s => String(s.stage) === String(sv)) : null;
            colorEl(el, info ? info.color : NO_COLOR);
        });
    }
    updateStats();
}

// ── Timeline ───────────────────────────────────────────
const DATA_DATES = ["2026-03-20", "2026-03-24", "2026-03-26", "2026-03-30", "2026-03-31"];

function formatDate(iso) {
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
}

function buildTimeline() {
    const tl = document.getElementById('timeline');
    if (!DATA_DATES.length) return;
    const lbl = document.createElement('span');
    lbl.className = 'timeline-label';
    lbl.textContent = 'Export date:';
    tl.appendChild(lbl);
    DATA_DATES.forEach(date => {
        const btn = document.createElement('button');
        btn.className = 'date-pill';
        btn.textContent = formatDate(date);
        btn.dataset.date = date;
        btn.onclick = () => loadDate(date);
        tl.appendChild(btn);
    });
}

function loadDate(date) {
    document.querySelectorAll('.date-pill').forEach(b =>
        b.classList.toggle('active', b.dataset.date === date));
    fetch(`data/${date}-data.csv`)
        .then(r => { if (!r.ok) throw new Error(); return r.text(); })
        .then(text => {
            parseCSV(text);
            document.getElementById('dataStatus').textContent = formatDate(date);
        })
        .catch(() => {
            document.getElementById('dataStatus').textContent = 'Load failed';
        });
}

buildTimeline();
if (DATA_DATES.length) loadDate(DATA_DATES[DATA_DATES.length - 1]);

// ── CSV loading ────────────────────────────────────────
function parseCSV(text) {
    const lines = text.split('\n').filter(l => l.trim());
    zoneData = {};
    const start = lines[0].toLowerCase().includes('zone_id') ? 1 : 0;
    lines.slice(start).forEach(line => {
        const parts = line.split(',');
        const id    = (parts[0] || '').trim();
        const stage = (parts[1] || '').trim();
        if (id && stage !== '')
            zoneData[id] = isNaN(stage) ? stage.toLowerCase() : Number(stage);
    });
    applyColors();
    return Object.keys(zoneData).length;
}

function loadCSV(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const n = parseCSV(e.target.result);
        document.getElementById('dataStatus').textContent = n + ' zones loaded';
    };
    reader.readAsText(file);
}

// ── Stats ──────────────────────────────────────────────
function updateStats() {
    const counts = {};
    [...STAGES, {stage: null}].forEach(s => { counts[String(s.stage ?? 'null')] = 0; });
    const seen = new Set();
    for (let i = 0; i < 4; i++) {
        const svgEl = document.querySelector('#panel-' + i + ' svg');
        if (!svgEl) continue;
        getZones(svgEl).forEach(({id}) => {
            if (seen.has(id)) return;
            seen.add(id);
            const sv = zoneData[id];
            if (sv !== undefined) {
                const key = String(sv);
                counts[key] = (counts[key] || 0) + 1;
            } else {
                counts['null']++;
            }
        });
    }
    [...STAGES, {stage: null}].forEach(s => {
        const key = String(s.stage ?? 'null');
        const el  = document.getElementById('cnt-' + (s.stage ?? 'nodata'));
        if (el) el.textContent = counts[key] ?? 0;
    });
    const complete = (counts['7'] || 0) + (counts['wintech'] || 0);
    const total    = ALL_ZONES.length;
    const pct      = total ? Math.round(complete / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent =
        complete + ' of ' + total + ' zones complete (' + pct + '%)';
}

// ── Tab switching ──────────────────────────────────────
function switchTab(idx) {
    document.querySelectorAll('.tab').forEach((t, i) =>
        t.classList.toggle('active', i === idx));
    document.querySelectorAll('.elev-panel').forEach((p, i) =>
        p.classList.toggle('active', i === idx));
}

// ── Tooltip ────────────────────────────────────────────
const tipEl = document.getElementById('tooltip');
function showTip(e, id) {
    const sv   = zoneData[id];
    const info = sv !== undefined ? STAGES.find(s => String(s.stage) === String(sv)) : null;
    const color = info ? info.color : NO_COLOR;
    const hasLink = !!ZONE_URLS[id];
    tipEl.innerHTML =
        `<div class="tip-id">${id}</div>` +
        `<div class="tip-stage">` +
        `<div class="tip-swatch" style="background:${color}"></div>` +
        `${info ? info.name : 'No data'}</div>` +
        (hasLink ? `<div style="margin-top:5px;font-size:0.7rem;color:#88aaff">Click to open in Dalux</div>` : '');
    tipEl.style.display = 'block';
    moveTip(e);
}
function moveTip(e) {
    tipEl.style.left = (e.clientX + 14) + 'px';
    tipEl.style.top  = (e.clientY + 14) + 'px';
}
function hideTip() { tipEl.style.display = 'none'; }
</script>
